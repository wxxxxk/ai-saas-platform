# ─── Prod 프로필 ──────────────────────────────────────────
# PostgreSQL + 환경변수 기반 설정
# DataInitializer 는 @Profile("!prod") 조건으로 이 프로필에서 실행되지 않는다.

# ─── DataSource ───────────────────────────────────────────
# 필수 환경변수: DB_URL, DB_USERNAME, DB_PASSWORD
# 예시(App Runner): DB_URL=jdbc:postgresql://<host>:5432/aisaasdb
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 커넥션 풀 (HikariCP)
# AI API 호출은 @Transactional 밖(JobPersistenceService)에서 수행되므로
# 커넥션 점유 시간이 수십 ms 수준으로 제한된다.
# maximum-pool-size=20: 시연 규모 기준 충분
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.keepalive-time=30000

# ─── JPA ──────────────────────────────────────────────────
# validate: Hibernate는 스키마를 변경하지 않고 엔티티와 DB 스키마를 검증만 한다.
# 스키마 변경은 Flyway 마이그레이션 파일(db/migration/V*.sql)로만 수행한다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── Flyway ───────────────────────────────────────────
spring.flyway.enabled=true
# 기존 DB에 flyway_schema_history 테이블이 없는 경우(최초 도입 시)
# V1을 실행하는 대신 현재 스키마를 기준선으로 표시하고 넘어간다.
# flyway_schema_history 테이블이 생성된 이후에는 이 설정은 무해하다.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.hibernate.ddl-auto=validate

# ─── H2 콘솔 비활성화 ─────────────────────────────────────
spring.h2.console.enabled=false

# ─── 로깅 ─────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.wxxk.aisaas=INFO
