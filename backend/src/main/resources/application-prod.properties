# ─── Prod 프로필 ──────────────────────────────────────────
# PostgreSQL + 환경변수 기반 설정
# DataInitializer 는 @Profile("!prod") 조건으로 이 프로필에서 실행되지 않는다.

# ─── DataSource ───────────────────────────────────────────
# 필수 환경변수: DB_URL, DB_USERNAME, DB_PASSWORD
# 예시(App Runner): DB_URL=jdbc:postgresql://<host>:5432/aisaasdb
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 커넥션 풀 (HikariCP 기본값 사용, 필요 시 조정)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ─── JPA ──────────────────────────────────────────────────
# update: 현재 단계에서는 Hibernate가 스키마를 자동 생성/변경한다.
# PostgreSQL 연결이 안정되면 validate + Flyway 마이그레이션으로 전환 예정.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── H2 콘솔 비활성화 ─────────────────────────────────────
spring.h2.console.enabled=false

# ─── 로깅 ─────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.wxxk.aisaas=INFO
