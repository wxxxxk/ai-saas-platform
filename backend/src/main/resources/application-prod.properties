# ─── Prod 프로필 ──────────────────────────────────────────
# PostgreSQL + 환경변수 기반 설정
# DataInitializer 는 @Profile("!prod") 조건으로 이 프로필에서 실행되지 않는다.

# ─── DataSource ───────────────────────────────────────────
# 필수 환경변수: DB_URL, DB_USERNAME, DB_PASSWORD
# 예시(App Runner): DB_URL=jdbc:postgresql://<host>:5432/aisaasdb
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 커넥션 풀 (HikariCP)
# createJob()이 @Transactional 범위 안에서 OpenAI를 동기 호출하므로
# 커넥션이 최대 90초(DALL-E) 동안 점유된다.
# maximum-pool-size=20: 동시 20명까지 안전, 초과 시 connection-timeout으로 큐
# ⚠ 기술부채: createJob()의 OpenAI 호출을 @Transactional 밖으로 분리해야 한다
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.keepalive-time=30000

# ─── JPA ──────────────────────────────────────────────────
# update: 현재 단계에서는 Hibernate가 스키마를 자동 생성/변경한다.
# PostgreSQL 연결이 안정되면 validate + Flyway 마이그레이션으로 전환 예정.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── H2 콘솔 비활성화 ─────────────────────────────────────
spring.h2.console.enabled=false

# ─── 로깅 ─────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.wxxk.aisaas=INFO
