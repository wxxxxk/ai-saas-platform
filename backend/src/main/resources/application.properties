spring.application.name=backend

# ─── 활성 프로필 ──────────────────────────────────────────
# 기본값: dev. 운영 환경에서는 환경변수로 재정의한다.
#   AWS App Runner / Docker: SPRING_PROFILES_ACTIVE=prod
#   JVM 인수: -Dspring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── JPA 공통 ─────────────────────────────────────────────
# DB / ddl-auto / show-sql 은 프로필별 파일에서 지정한다.
spring.jpa.open-in-view=false

# ─── OpenAI ───────────────────────────────────────────────
# 키가 없어도 서버가 기동되며, 실행 시점에 job.fail()로 처리된다.
openai.api.key=${OPENAI_API_KEY:}

# ─── Gemini ───────────────────────────────────────────────
# 키가 없어도 서버가 기동되며, 실행 시점에 job.fail()로 처리된다.
# 발급: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY:}

# ─── Claude (Anthropic) ───────────────────────────────
# 키가 없어도 서버가 기동되며, 실행 시점에 job.fail()로 처리된다.
# 발급: https://console.anthropic.com/settings/keys
claude.api.key=${CLAUDE_API_KEY:}

# ─── JWT ──────────────────────────────────────────────────
# 운영 환경에서는 환경변수 JWT_SECRET 을 반드시 설정할 것 (32자 이상)
jwt.secret=${JWT_SECRET:dev-jwt-secret-key-at-least-32-bytes!!}

# ─── Supabase Storage ─────────────────────────────────────
# 이미지 생성 결과를 영구 저장하기 위한 Supabase Storage 설정.
# 미설정 시 OpenAI 임시 URL (~1시간 만료)을 그대로 사용한다.
#
# 설정 방법:
#   1. https://supabase.com 프로젝트 생성
#   2. Storage → New bucket "images" → Public 체크
#   3. Settings → API → Project URL → SUPABASE_URL 환경변수에 설정
#   4. Settings → API → service_role key → SUPABASE_SERVICE_KEY 환경변수에 설정
supabase.url=${SUPABASE_URL:}
supabase.service.key=${SUPABASE_SERVICE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:images}
