# ─── Dev 프로필 ───────────────────────────────────────────
# H2 인메모리 DB + DataInitializer seed 사용
# DataInitializer 는 @Profile("!prod") 조건으로 이 프로필에서만 실행된다.

# ─── DataSource ───────────────────────────────────────────
# 파일 기반 H2: 재부팅 시에도 데이터 유지 (./data/aisaasdb.mv.db)
# 완전 초기화가 필요하면: rm -rf backend/data/
spring.datasource.url=jdbc:h2:file:./data/aisaasdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ───────────────────────────────────────────
# dev는 H2 + Hibernate ddl-auto=update 그대로 사용.
# Flyway는 PostgreSQL prod 전용이므로 dev에서는 비활성화한다.
spring.flyway.enabled=false

# ─── H2 콘솔 (개발 전용 — prod 에서는 절대 활성화하지 않는다) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── 진단 로그 (GET /api/jobs 401 원인 확인용 — 확인 후 제거) ──
logging.level.com.wxxk.aisaas.common.security.JwtAuthFilter=DEBUG

# ─── Supabase Storage (dev 로컬 값 — 실제 값으로 교체 또는 환경변수 사용) ──
# 설정 전까지는 OpenAI 임시 URL이 저장되며, 기동 시 경고 로그가 출력된다.
# supabase.url=https://xxxxxxxxxxxx.supabase.co
# supabase.service.key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
