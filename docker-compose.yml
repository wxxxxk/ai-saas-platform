services:
  postgres:
    image: postgres:16-alpine
    container_name: aisaas-postgres
    environment:
      POSTGRES_DB: aisaasdb
      POSTGRES_USER: aisaas
      POSTGRES_PASSWORD: aisaas_dev_pw
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisaas -d aisaasdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
